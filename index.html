const { useState, useEffect, useRef } = React;

const PLATFORMS = {
  streeteasy: { label: "StreetEasy", color: "#003366" },
  apartments:  { label: "Apts.com",  color: "#e84040" },
  zillow:      { label: "Zillow",    color: "#006aff" },
  renthop:     { label: "RentHop",  color: "#ff6b35" },
  trulia:      { label: "Trulia",   color: "#5a9e6f" },
  other:       { label: "Other",    color: "#6b7280" },
};

const STATUS = {
  scheduled: { label: "Scheduled", color: "#3b82f6", emoji: "📅" },
  visited:   { label: "Visited",   color: "#10b981", emoji: "✅" },
  passed:    { label: "Passed",    color: "#6b7280", emoji: "❌" },
  favorite:  { label: "Favorite",  color: "#f59e0b", emoji: "⭐" },
};

const HOUR_H    = 72;
const DAY_START = 7;
const DAY_END   = 22;

function detectPlatform(url) {
  if (!url) return "other";
  const l = url.toLowerCase();
  if (l.includes("streeteasy"))     return "streeteasy";
  if (l.includes("apartments.com")) return "apartments";
  if (l.includes("zillow"))         return "zillow";
  if (l.includes("renthop"))        return "renthop";
  if (l.includes("trulia"))         return "trulia";
  return "other";
}

function fmtTime(t) {
  const [h, m] = t.split(":").map(Number);
  return `${h % 12 || 12}:${String(m).padStart(2, "0")} ${h >= 12 ? "PM" : "AM"}`;
}

function uid() { return Math.random().toString(36).slice(2); }

function decodeState(s) {
  try { return JSON.parse(decodeURIComponent(escape(atob(s)))); } catch { return null; }
}

function parseListingText(raw) {
  if (!raw || raw.trim().length < 4) return {};
  const text = raw.replace(/\s+/g, " ");
  const priceM = text.match(/\$\s*([\d,]+)(?:\s*\/?\s*(?:mo|month))?/) || text.match(/([\d,]{4,})\s*\/\s*mo/i);
  const price  = priceM ? parseInt(priceM[1].replace(/,/g, ""), 10) : null;
  let beds = null;
  if (/\bstudio\b/i.test(text)) { beds = "Studio"; }
  else { const bm = text.match(/(\d+)\s*(?:bed(?:room)?s?|BR)\b/i); if (bm) beds = bm[1]; }
  const bathM = text.match(/([\d.]+)\s*(?:bath(?:room)?s?|BA)\b/i);
  const baths = bathM ? bathM[1] : null;
  const addrM = text.match(/(\d+[-\w]*\s+(?:[NSEW]\.\s*)?[A-Za-z0-9 ]+?(?:Street|St|Avenue|Ave|Boulevard|Blvd|Road|Rd|Place|Pl|Lane|Ln|Drive|Dr|Court|Ct|Terrace|Ter|Way|Parkway|Pkwy)\b[^,\n]*(?:,\s*(?:Apt|Unit|Suite|#)\s*[\w-]+)?)/i);
  const address = addrM ? addrM[1].trim().replace(/\s+/g, " ") : null;
  return { address, price, beds, baths };
}

function decodeEntities(s) {
  return (s || "").replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&nbsp;/g," ");
}

function parseFromText(title, desc) {
  const t = decodeEntities(title || "");
  const d = decodeEntities(desc  || "");
  const combined = t + " " + d;
  const priceMatch = combined.match(/\$\s*([\d,]+)/);
  const price = priceMatch ? parseInt(priceMatch[1].replace(/,/g,""),10) : null;
  let beds = null;
  if (/\bstudio\b/i.test(combined)) { beds = "Studio"; }
  else { const bm = combined.match(/(\d+)\s*(?:BR|bed(?:room)?s?)\b/i); if (bm) beds = bm[1]; }
  const bathM = combined.match(/([\d.]+)\s*(?:BA|bath(?:room)?s?)\b/i);
  const baths = bathM ? bathM[1] : null;
  let address = t
    .replace(/\s*[|\-–]\s*(StreetEasy|Apartments\.com|Zillow|RentHop|Trulia|Realtor\.com)\b.*/i,"")
    .replace(/^\d+\s*BR?\s*\/\s*[\d.]+\s*BA?\s*(?:Apartment\s+)?(?:at|in|@|for\s+rent\s+at)\s*/i,"")
    .replace(/\s*for\s+\$[\d,]+.*/i,"")
    .replace(/\s*[-–]\s*(?:\d+\s+(?:BR|Bed)|Studio)\b.*/i,"")
    .trim();
  return { address, price, beds, baths };
}

function parseFromHtml(html) {
  if (!html || html.length < 200) throw new Error("html too short");
  function getMeta(...keys) {
    for (const key of keys) {
      const esc = key.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
      const pats = [
        new RegExp(`<meta[^>]+(?:property|name)=["']${esc}["'][^>]+content=["']([^"'<>]+)["']`,"i"),
        new RegExp(`<meta[^>]+content=["']([^"'<>]+)["'][^>]+(?:property|name)=["']${esc}["']`,"i"),
      ];
      for (const re of pats) { const m = html.match(re); if (m&&m[1]) return decodeEntities(m[1].trim()); }
    }
    return null;
  }
  const title = getMeta("og:title","twitter:title") || "";
  const desc  = getMeta("og:description","twitter:description") || "";
  const imgSet = new Set();
  const imgPat1 = /<meta[^>]+(?:property|name)=["'](?:og:image[^"']*|twitter:image[^"']*)["'][^>]+content=["']([^"'<>]+)["']/gi;
  const imgPat2 = /<meta[^>]+content=["']([^"'<>]+)["'][^>]+(?:property|name)=["'](?:og:image|twitter:image)[^"']*["']/gi;
  for (const re of [imgPat1,imgPat2]) { let m; re.lastIndex=0; while((m=re.exec(html))!==null){const u=m[1]&&m[1].trim();if(u&&u.startsWith("http")&&!/logo|icon|sprite|pixel|badge|tracking/i.test(u))imgSet.add(u);} }
  const jsonLdPat = /<script[^>]+type=["']application\/ld\+json["'][^>]*>([\s\S]*?)<\/script>/gi;
  let jm;
  while((jm=jsonLdPat.exec(html))!==null){try{const schema=JSON.parse(jm[1]);const nodes=[].concat(schema["@graph"]||schema);for(const node of nodes){const imgs=[].concat(node.image||[],node.photo||[]);for(const img of imgs){const src=typeof img==="string"?img:((img&&(img.url||img.contentUrl))||"");if(src&&src.startsWith("http")&&!/logo|icon/i.test(src))imgSet.add(src);}}}catch(_){}}
  const images=[...imgSet].slice(0,10);
  const parsed=parseFromText(title,desc);
  if(!parsed.address&&!parsed.price&&!parsed.beds&&images.length===0)throw new Error("nothing useful found");
  return {...parsed,images};
}

function timedFetch(url,ms){
  ms=ms||9000;
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),ms);
  return fetch(url,{signal:ctrl.signal}).finally(()=>clearTimeout(timer));
}

async function fetchListingDetails(url) {
  const enc = encodeURIComponent(url);
  const stratA = timedFetch(`https://api.microlink.io/?url=${enc}`).then(async r=>{if(!r.ok)throw new Error("microlink "+r.status);const data=await r.json();if(data.status!=="success")throw new Error("microlink non-success");const{title="",description="",image}=data.data;const parsed=parseFromText(title,description);const images=(image&&image.url)?[image.url]:[];if(!parsed.address&&!parsed.price&&!parsed.beds&&images.length===0)throw new Error("microlink empty");return{...parsed,images};});
  const stratB = timedFetch(`https://corsproxy.io/?${enc}`).then(async r=>{if(!r.ok)throw new Error("corsproxy "+r.status);return parseFromHtml(await r.text());});
  const stratC = timedFetch(`https://api.allorigins.win/get?url=${enc}`).then(async r=>{if(!r.ok)throw new Error("allorigins "+r.status);const data=await r.json();return parseFromHtml(data.contents||"");});
  const stratD = timedFetch(`https://api.codetabs.com/v1/proxy?quest=${enc}`).then(async r=>{if(!r.ok)throw new Error("codetabs "+r.status);return parseFromHtml(await r.text());});
  return Promise.any([stratA,stratB,stratC,stratD]);
}

function PhotoCarousel({images,aspectRatio,rounded}){
  aspectRatio=aspectRatio||"16/9"; rounded=rounded||"xl";
  const[idx,setIdx]=useState(0);
  const[touchStart,setTouchStart]=useState(null);
  const[imgError,setImgError]=useState({});
  const validImages=(images||[]).filter((_,i)=>!imgError[i]);
  if(validImages.length===0)return null;
  const prev=(e)=>{if(e)e.stopPropagation();setIdx(i=>(i-1+validImages.length)%validImages.length);};
  const next=(e)=>{if(e)e.stopPropagation();setIdx(i=>(i+1)%validImages.length);};
  const onTouchStart=(e)=>setTouchStart(e.touches[0].clientX);
  const onTouchEnd=(e)=>{if(touchStart===null)return;const diff=touchStart-e.changedTouches[0].clientX;if(Math.abs(diff)>40)diff>0?next():prev();setTouchStart(null);};
  const currentSrc=validImages[idx]||validImages[0];
  const br=rounded==="none"?0:12;
  return(
    <div style={{position:"relative",overflow:"hidden",borderRadius:br,background:"#f3f4f6",aspectRatio}} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
      <img key={currentSrc} src={currentSrc} alt="Listing" onError={()=>setImgError(p=>({...p,[idx]:true}))} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
      <div style={{position:"absolute",bottom:0,left:0,right:0,height:48,background:"linear-gradient(to top,rgba(0,0,0,0.45),transparent)"}}/>
      {validImages.length>1&&<><button onClick={prev} style={{position:"absolute",left:8,top:"50%",transform:"translateY(-50%)",width:28,height:28,borderRadius:"50%",background:"rgba(0,0,0,0.45)",color:"white",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",border:"none",cursor:"pointer"}}>‹</button><button onClick={next} style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",width:28,height:28,borderRadius:"50%",background:"rgba(0,0,0,0.45)",color:"white",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",border:"none",cursor:"pointer"}}>›</button></>}
      {validImages.length>1&&<div style={{position:"absolute",bottom:8,left:"50%",transform:"translateX(-50%)",display:"flex",gap:4,alignItems:"center"}}>{validImages.map((_,i)=><button key={i} onClick={(e)=>{e.stopPropagation();setIdx(i);}} style={{borderRadius:"50%",border:"none",cursor:"pointer",padding:0,width:i===idx?18:6,height:6,background:i===idx?"white":"rgba(255,255,255,0.55)",transition:"all 0.2s"}}/>)}</div>}
      {validImages.length>1&&<div style={{position:"absolute",top:8,right:8,background:"rgba(0,0,0,0.5)",color:"white",fontSize:10,fontWeight:600,padding:"2px 7px",borderRadius:99}}>{idx+1}/{validImages.length}</div>}
    </div>
  );
}

// ─── Firebase ref ─────────────────────────────────────────────────────────
const DB_REF = "homerun/data";

const today=new Date().toISOString().split("T")[0];
const tomorrow=(()=>{const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().split("T")[0];})();
const SAMPLE=[
  {id:uid(),platform:"streeteasy",url:"https://streeteasy.com/rental/example",address:"245 E 25th St, Apt 8C",price:3800,beds:"2",baths:"1",date:today,startTime:"10:00",duration:60,status:"scheduled",images:[],notes:[],rating:{}},
  {id:uid(),platform:"apartments",url:"https://apartments.com/listing/example",address:"88 Lexington Ave, Apt 3F",price:4200,beds:"2",baths:"2",date:today,startTime:"13:30",duration:60,status:"visited",images:[],notes:[{text:"Great natural light! Kitchen was renovated.",author:"You",timestamp:new Date().toISOString()},{text:"Loved the closet space.",author:"Partner",timestamp:new Date().toISOString()}],rating:{p1:4,p2:5}},
  {id:uid(),platform:"renthop",url:"https://renthop.com/listing/example",address:"312 W 72nd St, Apt 12D",price:3600,beds:"1",baths:"1",date:tomorrow,startTime:"11:00",duration:60,status:"scheduled",images:[],notes:[],rating:{}},
];

function App(){
  const[listings,setListings]=useState(SAMPLE);
  const[date,setDate]=useState(today);
  const[view,setView]=useState("timeline");
  const[addOpen,setAddOpen]=useState(false);
  const[detail,setDetail]=useState(null);
  const[p1,setP1]=useState("You");
  const[p2,setP2]=useState("Partner");
  const[toast,setToast]=useState("");
  const[settingsOpen,setSettingsOpen]=useState(false);
  const[synced,setSynced]=useState(false); // true after first Firebase load
  const isRemoteUpdate=useRef(false);      // prevents save loop

  // ── Connect to Firebase and listen for live changes ──────────────────────
  useEffect(()=>{
    const ref=firebase.database().ref(DB_REF);
    ref.on("value",(snapshot)=>{
      const data=snapshot.val();
      isRemoteUpdate.current=true;
      if(data&&data.listings&&data.listings.length>0){
        setListings(data.listings);
        if(data.p1)setP1(data.p1);
        if(data.p2)setP2(data.p2);
      } else {
        // First ever launch — seed with sample data
        ref.set({listings:SAMPLE,p1:"You",p2:"Partner"});
      }
      setSynced(true);
    });
    return()=>ref.off("value");
  },[]);

  // ── Save to Firebase on any change (skip when Firebase triggered the change)
  useEffect(()=>{
    if(!synced)return;
    if(isRemoteUpdate.current){isRemoteUpdate.current=false;return;}
    firebase.database().ref(DB_REF).set({listings,p1,p2});
  },[listings,p1,p2,synced]);

  function showToast(msg){setToast(msg);setTimeout(()=>setToast(""),3500);}
  function share(){const url=window.location.href.split("#")[0];navigator.clipboard.writeText(url).then(()=>showToast("🔗 Link copied! Your partner will see everything live.")).catch(()=>prompt("Share this link with your partner:",url));}
  function addListing(l){setListings(prev=>[...prev,{...l,id:uid()}]);setDate(l.date);setView("timeline");showToast("📅 Added to "+new Date(l.date+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"}));}
  function updateListing(id,upd){setListings(prev=>prev.map(x=>x.id===id?{...x,...upd}:x));}
  function deleteListing(id){setListings(prev=>prev.filter(x=>x.id!==id));setDetail(null);}

  const dayListings=listings.filter(l=>l.date===date).sort((a,b)=>a.startTime.localeCompare(b.startTime));
  const detailListing=detail?listings.find(l=>l.id===detail):null;
  const dateStrip=Array.from({length:14},(_,i)=>{const d=new Date(today+"T12:00:00");d.setDate(d.getDate()-2+i);return d.toISOString().split("T")[0];});

  return(
    <div style={{minHeight:"100vh",background:"#f1f5f9",display:"flex",flexDirection:"column",fontFamily:"system-ui,-apple-system,sans-serif",maxWidth:480,margin:"0 auto"}}>
      <div style={{background:"white",borderBottom:"1px solid #e5e7eb",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:34,height:34,background:"linear-gradient(135deg,#6366f1,#4f46e5)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:"bold",fontSize:16}}>H</div>
          <div>
            <div style={{fontWeight:700,color:"#111827",fontSize:14,lineHeight:1.2}}>HomeRun</div>
            <div style={{fontSize:11,color:"#9ca3af",display:"flex",alignItems:"center",gap:4}}>
              Apartment Hunt Scheduler
              <span style={{display:"inline-flex",alignItems:"center",gap:3,marginLeft:4}}>
                <span style={{width:6,height:6,borderRadius:"50%",background:synced?"#10b981":"#f59e0b",display:"inline-block"}}/>
                <span style={{fontSize:10,color:synced?"#10b981":"#f59e0b",fontWeight:600}}>{synced?"Live":"Connecting…"}</span>
              </span>
            </div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <button onClick={()=>setSettingsOpen(true)} style={{width:32,height:32,borderRadius:8,background:"#f3f4f6",border:"none",cursor:"pointer",fontSize:14}}>⚙️</button>
          <button onClick={()=>setView(v=>v==="timeline"?"list":"timeline")} style={{fontSize:11,padding:"6px 10px",borderRadius:8,background:"#f3f4f6",border:"none",cursor:"pointer",color:"#4b5563",fontWeight:600}}>{view==="timeline"?"📋 List":"📅 Days"}</button>
          <button onClick={share} style={{fontSize:11,padding:"6px 12px",borderRadius:8,background:"linear-gradient(135deg,#6366f1,#4f46e5)",border:"none",cursor:"pointer",color:"white",fontWeight:600}}>Share 🔗</button>
        </div>
      </div>

      {view==="timeline"&&(
        <div style={{background:"white",borderBottom:"1px solid #e5e7eb",padding:"8px 12px",display:"flex",gap:4,overflowX:"auto",scrollbarWidth:"none"}}>
          {dateStrip.map(d=>{const dt=new Date(d+"T12:00:00");const count=listings.filter(l=>l.date===d).length;const sel=d===date;const isT=d===today;return(<button key={d} onClick={()=>setDate(d)} style={{flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",padding:"6px 10px",borderRadius:12,border:"none",cursor:"pointer",background:sel?"linear-gradient(135deg,#6366f1,#4f46e5)":"transparent"}}><span style={{fontSize:10,fontWeight:500,color:sel?"#c7d2fe":"#9ca3af"}}>{dt.toLocaleDateString("en-US",{weekday:"short"})}</span><span style={{fontSize:14,fontWeight:700,color:sel?"white":isT?"#6366f1":"#374151"}}>{dt.getDate()}</span>{count>0&&<span style={{width:5,height:5,borderRadius:"50%",background:sel?"white":"#6366f1",marginTop:2}}/>}</button>);})}
        </div>
      )}

      <div style={{flex:1,overflowY:"auto",paddingBottom:96}}>
        {view==="timeline"?<TimelineView listings={dayListings} date={date} onSelect={setDetail}/>:<ListView listings={listings} onSelect={setDetail} onDateClick={d=>{setDate(d);setView("timeline");}}/>}
      </div>

      <button onClick={()=>setAddOpen(true)} style={{position:"fixed",bottom:24,right:20,width:54,height:54,borderRadius:"50%",background:"linear-gradient(135deg,#6366f1,#4f46e5)",border:"none",cursor:"pointer",color:"white",fontSize:28,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 8px 24px rgba(99,102,241,0.45)",zIndex:30}}>+</button>
      {toast&&<div style={{position:"fixed",top:80,left:"50%",transform:"translateX(-50%)",zIndex:50,padding:"8px 16px",borderRadius:99,background:"#1f2937",color:"white",fontSize:13,fontWeight:600,whiteSpace:"nowrap",boxShadow:"0 4px 16px rgba(0,0,0,0.3)"}}>{toast}</div>}
      {addOpen&&<AddModal date={date} onAdd={addListing} onClose={()=>setAddOpen(false)}/>}
      {detailListing&&<DetailModal listing={detailListing} p1={p1} p2={p2} onUpdate={upd=>updateListing(detailListing.id,upd)} onDelete={()=>deleteListing(detailListing.id)} onClose={()=>setDetail(null)}/>}
      {settingsOpen&&<SettingsModal p1={p1} p2={p2} setP1={setP1} setP2={setP2} onClose={()=>setSettingsOpen(false)}/>}
    </div>
  );
}

function TimelineView({listings,date,onSelect}){
  const hours=Array.from({length:DAY_END-DAY_START},(_,i)=>DAY_START+i);
  const totalH=hours.length*HOUR_H;
  function topOf(time){const[h,m]=time.split(":").map(Number);return((h*60+m-DAY_START*60)/60)*HOUR_H;}
  function htOf(dur){return Math.max((dur/60)*HOUR_H,44);}
  const fmtDateLabel=d=>new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
  return(
    <div style={{padding:16}}>
      <div style={{fontSize:13,fontWeight:600,color:"#6b7280",marginBottom:12}}>{fmtDateLabel(date)}</div>
      {listings.length===0&&<div style={{textAlign:"center",paddingTop:64,paddingBottom:64,color:"#9ca3af"}}><div style={{fontSize:48}}>🏠</div><div style={{fontWeight:600,color:"#6b7280",marginTop:8}}>No showings scheduled</div><div style={{fontSize:12,marginTop:4}}>Tap + to add a listing</div></div>}
      {listings.length>0&&(<div style={{background:"white",borderRadius:16,boxShadow:"0 1px 4px rgba(0,0,0,0.07)",overflow:"hidden"}}><div style={{position:"relative",height:totalH}}>
        {hours.map(h=>(<div key={h} style={{position:"absolute",left:0,right:0,display:"flex",alignItems:"flex-start",top:(h-DAY_START)*HOUR_H}}><div style={{textAlign:"right",paddingRight:8,width:44,fontSize:10,color:"#c4c9d4",marginTop:-7,userSelect:"none"}}>{h===12?"12pm":h<12?`${h}am`:`${h-12}pm`}</div><div style={{flex:1,borderTop:"1px solid #f3f4f6"}}/></div>))}
        <div style={{position:"absolute",top:0,bottom:0,right:0,left:44}}>

        </div>

    </div>
  );
}

ng.p2||0))/([l.rating.p1,l.rating.p2].filter(Boolean).length||1)))}</span>}{l.notes&&l.notes.length>0&&<span style={{fontSize:11,color:"#9ca3af"}}>💬 {l.notes.length}</span>}<span style={{color:"#d1d5db",fontSize:18}}>›</span></div></div>);})}</div></div>))}</div>);
}

// ─── Add Modal ─────────────────────────────────────────────────────────────
function AddModal({date,onAdd,onClose}){
  const[url,setUrl]=useState("");
  const[platform,setPlatform]=useState("other");
  const[pasteText,setPasteText]=useState("");
  const[parsed,setParsed]=useState(null);
  const[address,setAddress]=useState("");
  const[price,setPrice]=useState("");
  const[beds,setBeds]=useState("");
  const[baths,setBaths]=useState("");
  const[selDate,setSelDate]=useState(date);
  const[time,setTime]=useState("10:00");
  const[duration,setDuration]=useState(60);
  const[images,setImages]=useState([]);
  const[error,setError]=useState("");
  const[fetching,setFetching]=useState(false);
  const[fetchMsg,setFetchMsg]=useState("");
  const[guideActive,setGuideActive]=useState(false);
  const debounceRef=useRef(null);
  const pasteRef=useRef(null);

  useEffect(()=>{setPlatform(url?detectPlatform(url):"other");},[url]);

  // Try auto-fetch; if it fails, show the guided copy-paste panel
  useEffect(()=>{
    if(debounceRef.current)clearTimeout(debounceRef.current);
    if(!url||!url.startsWith("http")){setFetchMsg("");setFetching(false);setGuideActive(false);return;}
    debounceRef.current=setTimeout(async()=>{
      setFetching(true);setFetchMsg("🔍 Trying to auto-fill from URL…");setGuideActive(false);
      try{
        const result=await fetchListingDetails(url);
        if(result.address&&!address)setAddress(result.address);
        if(result.price&&!price)setPrice(String(result.price));
        if(result.beds&&!beds)setBeds(result.beds);
        if(result.baths&&!baths)setBaths(result.baths);
        if(result.images&&result.images.length>0)setImages(result.images);
        const hits=[result.address,result.price,result.beds,result.images&&result.images.length>0].filter(Boolean).length;
        setFetchMsg(hits>=2?`✅ Auto-filled ${hits} fields!`:"⚠️ Got partial data — check fields below.");
        setGuideActive(false);
      }catch(e){
        setFetchMsg("");
        setGuideActive(true); // Show the guided workflow
      }finally{setFetching(false);}
    },900);
    return()=>clearTimeout(debounceRef.current);
  },[url]);

  // When user comes back to this tab, auto-focus the paste box
  useEffect(()=>{
    if(!guideActive)return;
    function onVisible(){
      if(document.visibilityState==="visible"){
        setTimeout(()=>{if(pasteRef.current){pasteRef.current.focus();pasteRef.current.scrollIntoView({behavior:"smooth",block:"center"});}},350);
      }
    }
    document.addEventListener("visibilitychange",onVisible);
    return()=>document.removeEventListener("visibilitychange",onVisible);
  },[guideActive]);

  // Parse pasted text
  useEffect(()=>{
    if(!pasteText.trim()){setParsed(null);return;}
    const result=parseListingText(pasteText);
    setParsed(result);
    if(result.address)setAddress(result.address);
    if(result.price)setPrice(String(result.price));
    if(result.beds)setBeds(result.beds);
    if(result.baths)setBaths(result.baths);
    setError("");
    if(guideActive&&(result.address||result.price||result.beds))setGuideActive(false);
  },[pasteText]);

  function handleAdd(){
    if(!address.trim()){setError("Please enter an address.");return;}
    if(!selDate){setError("Please select a date.");return;}
    if(!time){setError("Please select a start time.");return;}
    setError("");
    onAdd({url,platform,address:address.trim(),price:price?+price:null,beds,baths,date:selDate,startTime:time,duration,images,notes:[],status:"scheduled",rating:{}});
    onClose();
  }

  const plt=PLATFORMS[platform];
  const inp={width:"100%",marginTop:4,padding:"8px 12px",border:"1px solid #e5e7eb",borderRadius:12,fontSize:14,outline:"none",background:"white"};
  const lbl={display:"block",fontSize:10,fontWeight:600,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.05em"};
  const detectedChips=parsed?[parsed.address&&{label:"📍 "+parsed.address},parsed.price&&{label:`💰 $${parsed.price.toLocaleString()}/mo`},parsed.beds&&{label:`🛏 ${parsed.beds} bed`},parsed.baths&&{label:`🚿 ${parsed.baths} bath`}].filter(Boolean):[];

  return(
    <div style={{position:"fixed",inset:0,zIndex:50,display:"flex",alignItems:"flex-end",background:"rgba(0,0,0,0.45)"}} onClick={onClose}>
      <div style={{background:"white",borderRadius:"24px 24px 0 0",width:"100%",maxWidth:480,margin:"0 auto",padding:20,overflowY:"auto",maxHeight:"92vh"}} onClick={e=>e.stopPropagation()}>
        <div style={{width:40,height:4,borderRadius:99,background:"#e5e7eb",margin:"0 auto 16px"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <h2 style={{fontWeight:700,color:"#111827",fontSize:16,margin:0}}>Add Listing</h2>
          <button onClick={onClose} style={{width:32,height:32,borderRadius:"50%",background:"#f3f4f6",border:"none",cursor:"pointer",fontSize:14,color:"#6b7280"}}>✕</button>
        </div>
        <p style={{fontSize:12,color:"#9ca3af",marginBottom:16}}>Paste the listing URL — we'll try to fill everything in automatically.</p>

        <div style={{display:"flex",flexDirection:"column",gap:14}}>

          {/* URL field */}
          <div>
            <label style={lbl}>Listing URL</label>
            <input type="text" value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://streeteasy.com/…  or  https://renthop.com/…" style={inp}/>
            {url&&<div style={{marginTop:4}}><span style={{color:"white",padding:"2px 8px",borderRadius:99,fontWeight:700,backgroundColor:plt.color,fontSize:10}}>{plt.label}</span></div>}

            {/* Fetching spinner */}
            {fetching&&<div style={{marginTop:8,fontSize:12,padding:"10px 12px",borderRadius:10,background:"#eef2ff",color:"#4338ca",display:"flex",alignItems:"center",gap:8}}>⏳ Fetching listing details…</div>}

            {/* Success / partial message */}
            {fetchMsg&&!fetching&&<div style={{marginTop:8,fontSize:12,padding:"10px 12px",borderRadius:10,background:fetchMsg.startsWith("✅")?"#f0fdf4":fetchMsg.startsWith("⚠")?"#fffbeb":"#fef2f2",color:fetchMsg.startsWith("✅")?"#15803d":fetchMsg.startsWith("⚠")?"#92400e":"#dc2626"}}>{fetchMsg}</div>}

            {/* ── Guided copy-paste panel ── */}
            {guideActive&&!fetching&&(
              <div style={{marginTop:10,borderRadius:14,overflow:"hidden",border:"2px solid #6366f1",background:"white"}}>
                {/* Panel header */}
                <div style={{background:"linear-gradient(135deg,#6366f1,#4f46e5)",padding:"12px 16px",display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:20}}>📋</span>
                  <div>
                    <div style={{color:"white",fontWeight:700,fontSize:14,lineHeight:1.2}}>One extra step needed</div>
                    <div style={{color:"#c7d2fe",fontSize:11,marginTop:2}}>This site blocked auto-fill — follow these steps instead</div>
                  </div>
                </div>

                {/* Step list */}
                <div style={{padding:"14px 16px",background:"#f8f9ff",display:"flex",flexDirection:"column",gap:12}}>
                  {/* Step 1 */}
                  <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                    <div style={{width:24,height:24,borderRadius:"50%",background:"#6366f1",color:"white",fontWeight:700,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>1</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,color:"#374151",fontWeight:600,marginBottom:6}}>🌐 Open the listing page</div>
                      <button onClick={()=>window.open(url,"_blank","noopener")} style={{padding:"7px 16px",background:"linear-gradient(135deg,#6366f1,#4f46e5)",border:"none",borderRadius:8,color:"white",fontSize:12,fontWeight:700,cursor:"pointer"}}>Open listing in new tab →</button>
                    </div>
                  </div>

                  {/* Step 2 */}
                  <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                    <div style={{width:24,height:24,borderRadius:"50%",background:"#6366f1",color:"white",fontWeight:700,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>2</div>
                    <div style={{flex:1,fontSize:13,color:"#374151"}}>
                      <span style={{fontWeight:600}}>⌨️ On that page, press </span>
                      <kbd style={{background:"#e5e7eb",border:"1px solid #d1d5db",borderRadius:5,padding:"2px 7px",fontFamily:"monospace",fontSize:12,fontWeight:700}}>Ctrl+A</kbd>
                      <span style={{fontWeight:600}}> to select all text</span>
                    </div>
                  </div>

                  {/* Step 3 */}
                  <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                    <div style={{width:24,height:24,borderRadius:"50%",background:"#6366f1",color:"white",fontWeight:700,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>3</div>
                    <div style={{flex:1,fontSize:13,color:"#374151"}}>
                      <span style={{fontWeight:600}}>📋 Press </span>
                      <kbd style={{background:"#e5e7eb",border:"1px solid #d1d5db",borderRadius:5,padding:"2px 7px",fontFamily:"monospace",fontSize:12,fontWeight:700}}>Ctrl+C</kbd>
                      <span style={{fontWeight:600}}> to copy everything</span>
                    </div>
                  </div>

                  {/* Step 4 — paste target */}
                  <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                    <div style={{width:24,height:24,borderRadius:"50%",background:"#6366f1",color:"white",fontWeight:700,fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>4</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,color:"#374151",fontWeight:600,marginBottom:6}}>⬇️ Click back here, then paste below</div>
                      <textarea
                        ref={pasteRef}
                        value={pasteText}

                        rows={3}
                        style={{...inp,marginTop:0,resize:"none",lineHeight:1.5,border:"2px solid #6366f1",fontSize:13,padding:"10px 12px"}}
                      />
                      {detectedChips.length>0&&(
                        <div style={{marginTop:8,padding:10,borderRadius:10,background:"#f0fdf4",display:"flex",flexWrap:"wrap",gap:6}}>
                          <span style={{fontSize:11,fontWeight:700,color:"#15803d",width:"100%",marginBottom:2}}>✓ Detected from paste:</span>
                          {detectedChips.map((c,i)=><span key={i} style={{fontSize:11,padding:"2px 8px",borderRadius:99,fontWeight:600,background:"#dcfce7",color:"#15803d"}}>{c.label}</span>)}

                      )}
                    </div>
                  </div>
                </div>
              </div>

            {/* Photos (when auto-fetch succeeds) */}
            {images.length>0&&!guideActive&&<div style={{marginTop:8}}><PhotoCarousel images={images} aspectRatio="16/9" rounded="xl"/><div style={{fontSize:11,color:"#9ca3af",marginTop:4}}>{images.length} photo{images.length>1?"s":""} fetched</div></div>}

            <div><label style={lbl}>Beds</label><select value={beds} onChange={e=>setBeds(e.target.value)} style={inp}><option value="">—</option>{["Studio","1","2","3","4+"].map(o=><option key={o}>{o}</option>)}</select></div>
            <div><label style={lbl}>Baths</label><select value={baths} onChange={e=>setBaths(e.target.value)} style={inp}><option value="">—</option>{["1","1.5","2","2.5","3+"].map(o=><option key={o}>{o}</option>)}</select></div>
          </div>

          {/* Date / Time */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <div><label style={lbl}>Date *</label><input type="date" value={selDate} onChange={e=>setSelDate(e.target.value)} style={inp}/></div>
            <div><label style={lbl}>Start Time *</label><input type="time" value={time} onChange={e=>setTime(e.target.value)} style={inp}/></div>
          </div>

          {/* Duration */}
          <div><label style={lbl}>Duration</label><select value={duration} onChange={e=>setDuration(+e.target.value)} style={inp}><option value={30}>30 min</option><option value={60}>1 hour</option><option value={90}>1.5 hours</option><option value={120}>2 hours</option></select></div>

          {error&&<div style={{fontSize:13,color:"#ef4444",fontWeight:600,padding:"0 4px"}}>{error}</div>}
          <button type="button" onClick={handleAdd} style={{width:"100%",padding:"12px 0",background:"linear-gradient(135deg,#6366f1,#4f46e5)",border:"none",borderRadius:12,color:"white",fontWeight:700,fontSize:15,cursor:"pointer",marginTop:4}}>Add to Schedule ✓</button>
        </div>
      </div>
    </div>
  );
}

          </div>
          <div style={{marginBottom:16}}><p style={{fontSize:10,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}}>Status</p><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{Object.entries(STATUS).map(([key,s])=><button key={key} onClick={()=>onUpdate({status:key})} style={{fontSize:11,padding:"4px 12px",borderRadius:99,fontWeight:700,border:"none",cursor:"pointer",background:listing.status===key?s.color:s.color+"18",color:listing.status===key?"white":s.color}}>{s.emoji} {s.label}</button>)}</div></div>
          <div style={{borderRadius:16,padding:12,marginBottom:16,background:"#f8f9ff"}}><p style={{fontSize:10,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}}>Your Ratings</p><Stars value={listing.rating&&listing.rating.p1} onChange={v=>onUpdate({rating:{...listing.rating,p1:v}})} name={p1}/><div style={{marginTop:8}}><Stars value={listing.rating&&listing.rating.p2} onChange={v=>onUpdate({rating:{...listing.rating,p2:v}})} name={p2}/></div></div>
          <div style={{marginBottom:20}}><p style={{fontSize:10,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}}>Notes</p>{(!listing.notes||listing.notes.length===0)&&<p style={{fontSize:13,color:"#9ca3af",fontStyle:"italic",marginBottom:12}}>No notes yet — add impressions from the showing!</p>}<div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>{(listing.notes||[]).map((n,i)=><div key={i} style={{borderRadius:12,padding:12,background:"#eef2ff"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:11,fontWeight:700,color:"#6366f1"}}>{n.author}</span><span style={{fontSize:10,color:"#9ca3af"}}>{new Date(n.timestamp).toLocaleDateString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"})}</span></div><p style={{fontSize:13,color:"#374151",margin:0}}>{n.text}</p></div>)}</div><div style={{display:"flex",gap:8}}><select value={author} onChange={e=>setAuthor(e.target.value)} style={{border:"1px solid #e5e7eb",borderRadius:12,padding:"8px 10px",fontSize:12,background:"white",color:"#374151",flexShrink:0,outline:"none"}}><option value={p1}>{p1}</option><option value={p2}>{p2}</option></select><input value={note} onChange={e=>setNote(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addNote()} placeholder="Add a note…" style={{flex:1,fontSize:13,border:"1px solid #e5e7eb",borderRadius:12,padding:"8px 12px",outline:"none"}}/><button onClick={addNote} style={{padding:"8px 12px",background:"linear-gradient(135deg,#6366f1,#4f46e5)",border:"none",borderRadius:12,color:"white",fontSize:16,cursor:"pointer",flexShrink:0}}>+</button></div></div>
          <button onClick={()=>{if(window.confirm("Remove this listing?"))onDelete();}} style={{width:"100%",padding:"10px 0",borderRadius:12,fontSize:13,fontWeight:600,color:"#f87171",background:"none",border:"none",cursor:"pointer"}}>🗑 Remove listing</button>
        </div>
      </div>
    </div>
  );
}

function SettingsModal({p1,p2,setP1,setP2,onClose}){
  const[name1,setName1]=useState(p1);const[name2,setName2]=useState(p2);
  function save(){if(name1.trim())setP1(name1.trim());if(name2.trim())setP2(name2.trim());onClose();}
  const inp={width:"100%",marginTop:4,padding:"8px 12px",border:"1px solid #e5e7eb",borderRadius:12,fontSize:14,outline:"none",background:"white"};
  return(
    <div style={{position:"fixed",inset:0,zIndex:50,display:"flex",alignItems:"flex-end",background:"rgba(0,0,0,0.45)"}} onClick={onClose}>
      <div style={{background:"white",borderRadius:"24px 24px 0 0",width:"100%",maxWidth:480,margin:"0 auto",padding:20}} onClick={e=>e.stopPropagation()}>
        <div style={{width:40,height:4,borderRadius:99,background:"#e5e7eb",margin:"0 auto 16px"}}/>
        <h2 style={{fontWeight:700,color:"#111827",fontSize:16,margin:"0 0 4px"}}>Partner Names</h2>
        <p style={{fontSize:12,color:"#6b7280",marginBottom:16}}>Customize the names shown on notes and ratings.</p>
        <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:20}}>
          <div><label style={{display:"block",fontSize:10,fontWeight:600,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.05em"}}>Partner 1</label><input value={name1} onChange={e=>setName1(e.target.value)} placeholder="Your name" style={inp}/></div>
          <div><label style={{display:"block",fontSize:10,fontWeight:600,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.05em"}}>Partner 2</label><input value={name2} onChange={e=>setName2(e.target.value)} placeholder="Their name" style={inp}/></div>
        </div>
        <button onClick={save} style={{width:"100%",padding:"12px 0",background:"linear-gradient(135deg,#6366f1,#4f46e5)",border:"none",borderRadius:12,color:"white",fontWeight:700,fontSize:15,cursor:"pointer"}}>Save</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
